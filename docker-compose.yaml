services:
  backend:
    build: ./backend
    container_name: payment_backend
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"

  frontend:
    image: node:20
    container_name: payment_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    depends_on:
      - backend
